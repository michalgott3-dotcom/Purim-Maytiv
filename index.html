<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎭 מי מציע מה?</title>
<link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@700&family=Varela+Round&display=swap" rel="stylesheet">
<style>
:root{--purple:#7B2D8B;--gold:#F5A623;--pink:#E91E8C;--orange:#FF6B35;--cream:#FFF8F0;--dark:#2C1654;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Varela Round',sans-serif;background:var(--cream);min-height:100vh;direction:rtl;
  background-image:radial-gradient(circle at 10% 20%,rgba(123,45,139,.08) 0%,transparent 50%),
    radial-gradient(circle at 90% 80%,rgba(249,166,35,.1) 0%,transparent 50%);}
.container{max-width:960px;margin:0 auto;padding:20px;}
header{text-align:center;padding:40px 20px 30px;}
.emoji-row{font-size:2.5rem;margin-bottom:10px;animation:bounce 2s infinite;}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
h1{font-family:'Amatic SC',cursive;font-weight:700;font-size:clamp(2.8rem,8vw,5rem);color:var(--dark);
  text-shadow:3px 3px 0 var(--gold),5px 5px 0 rgba(123,45,139,.2);line-height:1.2;margin-bottom:8px;}
.subtitle{color:var(--purple);font-size:1.1rem;font-weight:700;opacity:.8;}
.section-title{font-weight:900;font-size:1.3rem;color:var(--dark);margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;margin:30px 0;}
.card{background:white;border-radius:20px;padding:24px;box-shadow:0 4px 20px rgba(44,22,84,.1);
  border:2px solid transparent;transition:all .3s;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:6px;
  background:linear-gradient(90deg,var(--purple),var(--pink),var(--gold));}
.card:hover{transform:translateY(-4px);box-shadow:0 10px 30px rgba(44,22,84,.18);border-color:var(--gold);}
.card-full{opacity:.82;}
.card-full::before{background:linear-gradient(90deg,#aaa,#ccc,#aaa);}
.card-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;}
.avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  color:white;font-weight:900;font-size:1.1rem;flex-shrink:0;}
.card-name{font-weight:900;font-size:1.15rem;color:var(--dark);flex:1;}
.capacity-tag{font-size:.72rem;font-weight:700;padding:2px 8px;border-radius:20px;background:#f0e6ff;color:var(--purple);white-space:nowrap;}
.capacity-tag.multi{background:#e6fff5;color:#00897B;}
.card-content{color:#555;font-size:.95rem;line-height:1.6;margin-bottom:16px;padding:10px 12px;background:var(--cream);border-radius:10px;}
.interested-label{font-size:.8rem;color:var(--purple);font-weight:700;margin-bottom:6px;}
.interested-list{display:flex;flex-wrap:wrap;gap:6px;min-height:28px;margin-bottom:14px;}
.badge{background:linear-gradient(135deg,#f0e6ff,#fde8f5);color:var(--purple);padding:3px 10px;border-radius:20px;font-size:.82rem;font-weight:700;border:1px solid rgba(123,45,139,.2);}
.no-reg{color:#aaa;font-size:.82rem;font-style:italic;}
.reg-row{display:flex;gap:8px;}
.reg-input{flex:1;padding:8px 12px;border:2px solid #e0d0f0;border-radius:10px;font-family:inherit;font-size:.9rem;direction:rtl;outline:none;transition:border-color .2s;}
.reg-input:focus{border-color:var(--pink);}
.reg-btn{background:linear-gradient(135deg,var(--purple),var(--pink));color:white;border:none;padding:8px 14px;border-radius:10px;cursor:pointer;font-family:inherit;font-weight:700;font-size:.9rem;transition:transform .15s,box-shadow .15s;white-space:nowrap;}
.reg-btn:hover{transform:scale(1.05);box-shadow:0 4px 12px rgba(233,30,140,.35);}
.locked{background:#f5f5f5;border:2px solid #e0e0e0;border-radius:10px;padding:10px 14px;font-size:.88rem;color:#777;text-align:center;}
.locked strong{color:var(--purple);}
.divider{height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:30px 0;}
.add-section{background:white;border-radius:24px;padding:30px;box-shadow:0 4px 24px rgba(44,22,84,.1);border:3px dashed var(--gold);}
.add-section h2{color:var(--dark);font-size:1.4rem;font-weight:900;margin-bottom:20px;text-align:center;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
@media(max-width:500px){.form-grid{grid-template-columns:1fr}}
.form-group{display:flex;flex-direction:column;gap:6px;}
label{font-size:.85rem;font-weight:700;color:var(--purple);}
.form-input{padding:10px 14px;border:2px solid #e0d0f0;border-radius:12px;font-family:inherit;font-size:.95rem;direction:rtl;outline:none;transition:border-color .2s,box-shadow .2s;}
.form-input:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(123,45,139,.1);}
.add-btn{width:100%;background:linear-gradient(135deg,var(--orange),var(--gold));color:white;border:none;padding:14px;border-radius:14px;font-family:inherit;font-weight:900;font-size:1.1rem;cursor:pointer;transition:transform .2s,box-shadow .2s;box-shadow:0 4px 16px rgba(255,107,53,.3);}
.add-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(255,107,53,.4);}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(120px);background:linear-gradient(135deg,var(--purple),var(--pink));color:white;padding:14px 28px;border-radius:50px;font-weight:700;font-size:1rem;box-shadow:0 8px 24px rgba(44,22,84,.4);transition:transform .4s cubic-bezier(.34,1.56,.64,1);z-index:1000;}
.toast.show{transform:translateX(-50%) translateY(0);}
footer{text-align:center;padding:30px;color:var(--purple);font-size:1rem;opacity:.7;}
.hamantash{display:inline-block;animation:spin 4s linear infinite;}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.loading{text-align:center;padding:60px;font-size:1.3rem;color:var(--purple);}
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="emoji-row">🎭🍷🎪✨🎊</div>
    <h1>מי מציע מה? 🎁</h1>
    <p class="subtitle">📜 מציעים "משלוחי מנוח" מיטיבים ונרשמים לקבל אותם 📜</p>
  </header>
  <div class="section-title">🎀 משלוחי המנות שלנו</div>
  <div id="loading" class="loading">🎭 טוען נתונים...</div>
  <div class="cards-grid" id="cardsContainer" style="display:none"></div>
  <div class="divider"></div>
  <div class="add-section">
    <h2>🌟 רוצה להציע משלוח מנות משלך? 🌟</h2>
    <div class="form-grid">
      <div class="form-group">
        <label>👤 שמך</label>
        <input class="form-input" id="newName" type="text" placeholder="למשל: מירי">
      </div>
      <div class="form-group">
        <label>🎁 מה אתה/את מציע/ה?</label>
        <input class="form-input" id="newOffer" type="text" placeholder="למשל: סדנת ציור בצבעי מים">
      </div>
    </div>
    <button class="add-btn" onclick="addCard()">🎉 הוסף את המשלוח שלי לרשימה!</button>
  </div>
  <footer>🎭 פורים שמח לכולם! 🎭 &nbsp;|&nbsp; <span class="hamantash">🥨</span></footer>
</div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, onValue, set, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

// ============================================================
//  🔧 הכניסי כאן את פרטי ה-Firebase שלך
// ============================================================
const firebaseConfig = {
  apiKey: "AIzaSyDTPvmMC7EkABKaLsucmhB58chvaksaFNc",
  authDomain: "purim-7952e.firebaseapp.com",
  databaseURL: "https://purim-7952e-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "purim-7952e",
  storageBucket: "purim-7952e.firebasestorage.app",
  messagingSenderId: "575267798482",
  appId: "1:575267798482:web:e7a12c09d2d8614a451c0b"
};
// ============================================================

const DEFAULTS = [
  {name:"שני",   offer:"🟣 אלמד להכין קובה סלק",                      interested:["אפרת מ"],       maxOne:true},
  {name:"עדית",  offer:"🍞 שיעור הכנת חלה",                            interested:["לביאה"],        maxOne:false},
  {name:"עדית",  offer:"🌾 סדנה להכנת לחם מחמצת, חצי יום בכפר חיים", interested:["נטלי","מיטל"],  maxOne:false},
  {name:"עדי י", offer:"🌄 לילה במצפה רמון וטיול במכתש",               interested:[],               maxOne:true},
  {name:"קרן",   offer:"☕ קפה וחניכה על שיעור לבחירתך",               interested:[],               maxOne:true},
  {name:"נורית", offer:"🔮 אבחון אניאגרם סגנון אישיות",                interested:[],               maxOne:true},
  {name:"לביאה", offer:"🧶 סדנת סריגה",                                 interested:["טלי"],          maxOne:true},
  {name:"יעל",   offer:"🏗️ איך מכינים דברים קטנים מבטון",              interested:["מיכל גולדפרב"], maxOne:true},
  {name:"נטלי",  offer:"💼 חניכה אישית לבניית מצגות",                  interested:[],               maxOne:true},
  {name:"סיגל",  offer:"🫕 הכנת אוכל פרסי",                            interested:["מיטל"],         maxOne:true},
  {name:"הדר",   offer:"🧘 הדרכה יוגה לפנים",                           interested:["עדית"],         maxOne:true},
];

const AC=[["#7B2D8B","#E91E8C"],["#E91E8C","#FF6B35"],["#FF6B35","#F5A623"],["#2C1654","#7B2D8B"],
  ["#00897B","#00BCD4"],["#E53935","#F5A623"],["#5E35B1","#00ACC1"],["#F06292","#CE93D8"]];

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const dataRef = ref(db, "mishloach2025");

let currentData = [];

// המרת אובייקט Firebase למערך
function fbToArray(val) {
  if (!val) return [];
  // עיבוד פריט בודד
  function parseItem(item) {
    if (!item) return null;
    let interested = [];
    if (item.interested) {
      if (Array.isArray(item.interested)) {
        interested = item.interested.filter(x => x != null);
      } else if (typeof item.interested === 'object') {
        interested = Object.values(item.interested).filter(x => x != null);
      }
    }
    return {
      name: item.name || '',
      offer: item.offer || '',
      maxOne: item.maxOne !== undefined ? item.maxOne : true,
      interested: interested
    };
  }
  if (Array.isArray(val)) {
    return val.map(parseItem).filter(x => x != null);
  }
  return Object.keys(val).sort((a,b) => Number(a)-Number(b))
    .map(k => parseItem(val[k])).filter(x => x != null);
}

// המרת מערך לאובייקט לשמירה ב-Firebase (ללא נקודות במפתחות)
function arrayToFb(arr) {
  const obj = {};
  arr.forEach((item, i) => {
    const intObj = {};
    item.interested.forEach((n, j) => { intObj[String(j)] = n; });
    obj[String(i)] = { name: item.name, offer: item.offer, interested: intObj, maxOne: item.maxOne };
  });
  return obj;
}

onValue(dataRef, (snapshot) => {
  if (snapshot.exists()) {
    currentData = fbToArray(snapshot.val());
  } else {
    currentData = DEFAULTS.map(d => ({...d, interested:[...d.interested]}));
    set(dataRef, arrayToFb(currentData));
  }
  renderCards(currentData);
  document.getElementById("loading").style.display = "none";
  document.getElementById("cardsContainer").style.display = "grid";
}, (error) => {
  document.getElementById("loading").textContent = "❌ שגיאת חיבור: " + error.message;
});

window.reg = async function(i) {
  const inp = document.getElementById("inp"+i);
  const name = inp.value.trim();
  if (!name) return;
  if (currentData[i].maxOne && currentData[i].interested.length >= 1) {
    showToast("🔒 המקום כבר נתפס!"); return;
  }
  if (currentData[i].interested.includes(name)) {
    showToast(name+" כבר רשומ/ה! 😄"); return;
  }
  currentData[i].interested.push(name);
  inp.value = "";
  await set(dataRef, arrayToFb(currentData));
  showToast(name+" נרשמ/ה בהצלחה! 🎊");
};

window.addCard = async function() {
  const name = document.getElementById("newName").value.trim();
  const offer = document.getElementById("newOffer").value.trim();
  if (!name || !offer) { showToast("⚠️ נא למלא שם וסוג המשלוח"); return; }
  currentData.push({name, offer, interested:[], maxOne:true});
  document.getElementById("newName").value = "";
  document.getElementById("newOffer").value = "";
  await set(dataRef, arrayToFb(currentData));
  showToast(name+" הצטרפ/ה לרשימה! 🥳");
  setTimeout(()=>{ document.getElementById("cardsContainer").lastChild.scrollIntoView({behavior:"smooth",block:"center"}); },300);
};

function avStyle(i){const c=AC[i%AC.length];return `background:linear-gradient(135deg,${c[0]},${c[1]})`;}

function renderCards(data) {
  const el = document.getElementById("cardsContainer");
  el.innerHTML = "";
  data.forEach((item, i) => {
    const full = item.maxOne && item.interested.length >= 1;
    const badges = item.interested.length
      ? item.interested.map(n=>`<span class="badge">✨ ${n}</span>`).join("")
      : `<span class="no-reg">אין עדיין... היה הראשון/ה!</span>`;
    const cap = item.maxOne
      ? `<span class="capacity-tag">👥 1 מקום</span>`
      : `<span class="capacity-tag multi">👥 מספר מקומות</span>`;
    const lbl = item.maxOne ? "🙋 נרשמ/ה:" : "🙋 מתעניינים:";
    const bot = full
      ? `<div class="locked">🔒 המקום נתפס! <strong>${item.interested[0]}</strong> כבר נרשמ/ה 🎉</div>`
      : `<div class="reg-row"><input class="reg-input" placeholder="הכנסי/הכנס את שמך" id="inp${i}" onkeydown="if(event.key==='Enter')reg(${i})"><button class="reg-btn" onclick="reg(${i})">אני רוצה! 🎉</button></div>`;
    const div = document.createElement("div");
    div.className = "card"+(full?" card-full":"");
    div.innerHTML =
      `<div class="card-header"><div class="avatar" style="${avStyle(i)}">${item.name.trim()[0]}</div>` +
      `<div class="card-name">${item.name}</div>${cap}</div>` +
      `<div class="card-content">🎁 ${item.offer}</div>` +
      `<div class="interested-label">${lbl}</div>` +
      `<div class="interested-list">${badges}</div>${bot}`;
    el.appendChild(div);
  });
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"), 3000);
}
</script>
</body>
</html>
